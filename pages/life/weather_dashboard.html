<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 날씨 예측 대시보드</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f5f5f7;color:#1d1d1f;font-size:13px;line-height:1.5}
::-webkit-scrollbar{height:5px;width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d1d6;border-radius:10px}
.filter-panel{background:#fff;border-bottom:1px solid #e5e5ea;padding:14px 20px;position:sticky;top:0;z-index:100;position:relative}
.ver-badge{position:absolute;top:10px;right:14px;font-size:10px;font-weight:600;color:#8e8e93;background:#f5f5f7;border:1px solid #e5e5ea;border-radius:5px;padding:2px 7px;letter-spacing:.03em}
.panel-title{font-size:12px;font-weight:600;color:#8e8e93;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.flabel{font-size:11px;font-weight:500;color:#8e8e93}
select,input[type=text],input[type=date],input[type=password]{height:34px;border:1px solid #e5e5ea;border-radius:8px;padding:0 10px;font-size:12px;font-family:inherit;color:#1d1d1f;background:#fafafa;outline:none;transition:border-color .15s,background .15s}
select:hover,input:hover{border-color:#c7c7cc;background:#fff}
select:focus,input:focus{border-color:#007aff;background:#fff;box-shadow:0 0 0 3px rgba(0,122,255,.1)}
.slider-row{display:flex;align-items:center;gap:8px}
input[type=range]{-webkit-appearance:none;width:100px;height:4px;background:#e5e5ea;border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#007aff;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.sval{font-size:12px;font-weight:600;color:#007aff;min-width:26px}
.btn-apply{height:34px;padding:0 18px;background:#007aff;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap}
.btn-apply:hover{background:#0071e3}
.btn-apply:active{transform:scale(.97)}
.btn-apply:disabled{background:#c7c7cc;cursor:not-allowed;transform:none}
.recent-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;align-items:center}
.rtag{font-size:11px;padding:3px 9px;background:#f5f5f7;border:1px solid #e5e5ea;border-radius:20px;cursor:pointer;color:#636366;transition:all .12s}
.rtag:hover{background:#007aff;border-color:#007aff;color:#fff}
.apikey-row{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f5}
.kpi-bar{background:#fff;border-bottom:1px solid #e5e5ea;padding:14px 20px}
.kpi-title{font-size:15px;font-weight:600;color:#1d1d1f;margin-bottom:10px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
.kc{background:#f5f5f7;border-radius:10px;padding:10px 12px}
.kc-label{font-size:11px;color:#8e8e93;margin-bottom:3px}
.kc-val{font-size:18px;font-weight:600;color:#1d1d1f;line-height:1.2}
.kbadge{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;margin-left:3px;vertical-align:middle;background:#e8f8ef;color:#166534}
.status-bar{padding:9px 20px;font-size:12px;display:none;align-items:center;gap:8px}
.s-info{background:#eff6ff;color:#1d4ed8;border-bottom:1px solid #bfdbfe}
.s-err{background:#fff1f0;color:#b91c1c;border-bottom:1px solid #fecaca}
.s-ok{background:#f0fdf4;color:#166534;border-bottom:1px solid #bbf7d0}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid #bfdbfe;border-top-color:#007aff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.prog-wrap{padding:4px 20px 8px;display:none;background:#fff;border-bottom:1px solid #f0f0f5}
.prog-track{height:3px;background:#e5e5ea;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#007aff;border-radius:2px;transition:width .4s}
.prog-label{font-size:11px;color:#8e8e93;margin-top:4px}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 20px;background:#fff;border-bottom:1px solid #f0f0f5}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#636366}
.ld{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.matrix-wrap{overflow-x:auto;padding:0 0 24px}
table{border-collapse:collapse;width:max-content;min-width:100%}
th,td{padding:6px 8px;border:1px solid #f0f0f5;vertical-align:top}
thead th{background:#fafafa;font-size:10px;font-weight:600;color:#8e8e93;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;position:sticky;top:0;z-index:10}
th:first-child,td:first-child{position:sticky;left:0;z-index:5;background:#fff;min-width:72px}
thead th:first-child{z-index:20;background:#fafafa}
.ch-h{background:#fafafa!important;text-align:center;border-bottom:2px solid #e5e5ea!important}
.ch-o{background:#f0f7ff!important;text-align:center;border-bottom:2px solid #93c5fd!important;color:#1d4ed8!important}
.ch-a{background:#f5f3ff!important;text-align:center;border-bottom:2px solid #a78bfa!important;color:#5b21b6!important}
.sbadge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px}
.sb-h{background:#f0f0f5;color:#636366}
.sb-o{background:#dbeafe;color:#1e40af}
.sb-a{background:#ede9fe;color:#5b21b6}

/* 날씨 셀 */
.weather-cell{min-width:130px;font-size:11px;padding:6px 8px!important}
.ampm-wrap{display:flex;gap:6px;align-items:stretch;margin-bottom:4px}
.slot{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 2px;border-radius:5px}
.slot-am{background:rgba(251,191,36,.08)}
.slot-pm{background:rgba(59,130,246,.06)}
.slot-lbl{font-size:8px;font-weight:600;color:#8e8e93;letter-spacing:.04em}
.slot-icon{font-size:16px;line-height:1}
.slot-cond{font-size:9px;color:#636366;white-space:nowrap}
.slot-hum{font-size:9px;color:#0891b2;font-weight:500}
.slot-rain{font-size:9px;font-weight:600;color:#1a56db}
.slot-divider{width:1px;background:#f0f0f5;align-self:stretch}
.temp-row{display:flex;align-items:center;justify-content:center;gap:4px}
.tmin{font-size:12px;font-weight:600;color:#0071e3}
.tmax{font-size:12px;font-weight:600;color:#e53e3e}
.sep{color:#d1d1d6;font-size:10px}
.cell-loading{text-align:center;padding:18px 10px;background:#fafafa;min-width:130px}
.cell-fail{text-align:center;color:#fca5a5;font-size:11px;padding:18px 10px;background:#fff5f5;min-width:130px}
.cell-ai-wait{text-align:center;padding:18px 10px;background:#f9f7ff;font-size:11px;color:#a78bfa;min-width:140px}
.conf-badge{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;display:inline-block;margin-top:3px}
.ch{background:#dcfce7;color:#166534}
.cm{background:#fef9c3;color:#854d0e}
.cl{background:#fee2e2;color:#991b1b}
.reason{font-size:10px;color:#8e8e93;display:block;margin-top:2px;max-width:130px;white-space:normal;line-height:1.35}

/* 차트 */
.chart-panel{background:#fff;border-top:1px solid #e5e5ea;padding:20px 20px 8px}
.chart-section{margin-bottom:28px}
.chart-title{font-size:12px;font-weight:600;color:#8e8e93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.chart-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.cl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#636366}
.cl-dot{width:24px;height:3px;border-radius:2px;flex-shrink:0}
.cl-dot-dash{width:24px;height:0;border-top:2px dashed;flex-shrink:0}
</style>
</head>
<body>

<div class="filter-panel">
  <span class="ver-badge">v5.0</span>
  <div class="panel-title">날씨 조회 설정</div>
  <div class="filter-row">
    <div class="fg">
      <span class="flabel">나라</span>
      <select id="countrySelect" onchange="onCountryChange()">
        <option value="">선택</option>
        <option value="대한민국 🇰🇷">대한민국 🇰🇷</option>
        <option value="일본 🇯🇵">일본 🇯🇵</option>
        <option value="미국 🇺🇸">미국 🇺🇸</option>
        <option value="영국 🇬🇧">영국 🇬🇧</option>
        <option value="프랑스 🇫🇷">프랑스 🇫🇷</option>
        <option value="독일 🇩🇪">독일 🇩🇪</option>
        <option value="호주 🇦🇺">호주 🇦🇺</option>
        <option value="중국 🇨🇳">중국 🇨🇳</option>
        <option value="태국 🇹🇭">태국 🇹🇭</option>
        <option value="기타 ✏️">기타 ✏️</option>
      </select>
    </div>
    <div class="fg" id="citySelectGroup">
      <span class="flabel">도시</span>
      <select id="citySelect" onchange="onCityChange()"><option>나라 먼저 선택</option></select>
    </div>
    <div class="fg" id="cityInputGroup" style="display:none">
      <span class="flabel">도시 직접 입력</span>
      <input type="text" id="cityInput" placeholder="예: 파주, Paju" style="width:130px">
    </div>
    <div class="fg" id="countryInputGroup" style="display:none">
      <span class="flabel">나라 직접 입력</span>
      <input type="text" id="countryInput" placeholder="예: 캐나다" style="width:110px">
    </div>
    <div class="fg">
      <span class="flabel">시작일</span>
      <input type="date" id="dateStart">
    </div>
    <div class="fg">
      <span class="flabel">종료일</span>
      <input type="date" id="dateEnd">
    </div>
    <div class="fg">
      <span class="flabel">과거 데이터</span>
      <div class="slider-row">
        <input type="range" id="yearSlider" min="1" max="10" value="3" step="1"
          oninput="document.getElementById('yearVal').textContent=this.value+'년'">
        <span class="sval" id="yearVal">3년</span>
      </div>
    </div>
    <div class="fg">
      <span class="flabel">&nbsp;</span>
      <button class="btn-apply" id="applyBtn" onclick="applyFilter()">조회</button>
    </div>
  </div>
  <div class="apikey-row">
    <span class="flabel" style="white-space:nowrap">Claude API Key</span>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api... (입력 시 AI 예측 활성화)"
      style="flex:1;max-width:380px;font-family:monospace;font-size:11px">
    <span style="font-size:11px;color:#c7c7cc">미입력 시 AI 예측 비활성</span>
  </div>
  <div class="recent-row" id="recentRow"></div>
</div>

<div id="statusBar" class="status-bar"></div>
<div class="prog-wrap" id="progWrap">
  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-label" id="progLabel"></div>
</div>

<div class="kpi-bar">
  <div class="kpi-title" id="kpiTitle">도시를 선택하고 조회하세요</div>
  <div class="kpi-grid" id="kpiGrid">
    <div class="kc"><div class="kc-label">평균 최고기온</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">평균 최저기온</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">강수일수</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">총 강수량</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">평균 습도</div><div class="kc-val">—</div></div>
    <div class="kc"><div class="kc-label">평균 풍속</div><div class="kc-val">—</div></div>
  </div>
</div>

<div class="legend">
  <div class="li"><div class="ld" style="background:#fef3c7;border:1px solid #fcd34d"></div>오전 슬롯</div>
  <div class="li"><div class="ld" style="background:#dbeafe;border:1px solid #93c5fd"></div>오후 슬롯</div>
  <div class="li"><div class="ld" style="background:#f5f5f7;border:1px solid #d1d1d6"></div>과거 실측</div>
  <div class="li"><div class="ld" style="background:#f0f7ff;border:1px solid #93c5fd"></div>공식 예보</div>
  <div class="li"><div class="ld" style="background:#f5f3ff;border:1px solid #a78bfa"></div>AI 예측</div>
  <div class="li"><div class="ld" style="background:#dbeafe"></div>약한 비 1–5mm</div>
  <div class="li"><div class="ld" style="background:#93c5fd"></div>보통 비 5–15mm</div>
  <div class="li"><div class="ld" style="background:#3b82f6"></div>강한 비 15mm+</div>
</div>

<div class="matrix-wrap">
  <table>
    <thead id="matrixHead"></thead>
    <tbody id="matrixBody"></tbody>
  </table>
</div>

<div class="chart-panel" id="chartPanel" style="display:none">
  <div class="chart-section">
    <div class="chart-title">기온 추이
      <span style="font-size:11px;font-weight:400;color:#c7c7cc">— 오전 최고 (실선) / 오후 최고 (점선)</span>
    </div>
    <div class="chart-legend" id="tempLegend"></div>
    <div style="position:relative;width:100%;height:260px">
      <canvas id="tempChart"></canvas>
    </div>
  </div>
  <div class="chart-section">
    <div class="chart-title">강수량
      <span style="font-size:11px;font-weight:400;color:#c7c7cc">— 일별 총 강수량 (mm)</span>
    </div>
    <div class="chart-legend" id="rainLegend"></div>
    <div style="position:relative;width:100%;height:200px">
      <canvas id="rainChart"></canvas>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CITY_DATA={
  "대한민국 🇰🇷":{cities:["서울","파주","인천","수원","부산","대구","광주","제주","직접 입력..."],coords:{"서울":[37.5665,126.9780],"파주":[37.7597,126.7801],"인천":[37.4563,126.7052],"수원":[37.2636,127.0286],"부산":[35.1796,129.0756],"대구":[35.8714,128.6014],"광주":[35.1595,126.8526],"제주":[33.4996,126.5312]}},
  "일본 🇯🇵":{cities:["도쿄","오사카","삿포로","후쿠오카","교토","나고야","직접 입력..."],coords:{"도쿄":[35.6762,139.6503],"오사카":[34.6937,135.5023],"삿포로":[43.0618,141.3545],"후쿠오카":[33.5904,130.4017],"교토":[35.0116,135.7681],"나고야":[35.1815,136.9066]}},

};
const WL={0:"맑음",1:"대체로맑음",2:"구름조금",3:"흐림",45:"안개",48:"안개",51:"이슬비",53:"이슬비",55:"이슬비",61:"비",63:"비",65:"강한비",71:"눈",73:"눈",75:"강한눈",80:"소나기",81:"소나기",82:"강한소나기",95:"뇌우",96:"뇌우",99:"뇌우"};
const WI={0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌦️",53:"🌦️",55:"🌦️",61:"🌧️",63:"🌧️",65:"🌧️",71:"🌨️",73:"🌨️",75:"🌨️",80:"⛈️",81:"⛈️",82:"⛈️",95:"⛈️",96:"⛈️",99:"⛈️"};
const DAYS=["일","월","화","수","목","금","토"];
const PALETTE=[
  {max:'#f97316',min:'#fed7aa',rain:'rgba(249,115,22,.7)'},
  {max:'#8b5cf6',min:'#ddd6fe',rain:'rgba(139,92,246,.7)'},
  {max:'#10b981',min:'#a7f3d0',rain:'rgba(16,185,129,.7)'},
  {max:'#ef4444',min:'#fecaca',rain:'rgba(239,68,68,.7)'},
  {max:'#0ea5e9',min:'#bae6fd',rain:'rgba(14,165,233,.7)'},
  {max:'#f59e0b',min:'#fde68a',rain:'rgba(245,158,11,.7)'},
  {max:'#ec4899',min:'#fbcfe8',rain:'rgba(236,72,153,.7)'},
  {max:'#14b8a6',min:'#99f6e4',rain:'rgba(20,184,166,.7)'},
  {max:'#6366f1',min:'#c7d2fe',rain:'rgba(99,102,241,.7)'},
  {max:'#84cc16',min:'#d9f99d',rain:'rgba(132,204,22,.7)'},
];
const OFF_COLOR={max:'#1d4ed8',min:'#93c5fd',rain:'rgba(29,78,216,.85)'};
let recentSearches=[], tempChartInst=null, rainChartInst=null;

/* ── 날짜 유틸 ── */
const todayStr=()=>new Date().toISOString().slice(0,10);
const offsetDate=(s,n)=>{const d=new Date(s);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
function getDates(s,e){const a=[],c=new Date(s),end=new Date(e);while(c<=end){a.push(new Date(c));c.setDate(c.getDate()+1)}return a}
const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;
const sum=arr=>arr.reduce((a,b)=>a+b,0);

/* ── Open-Meteo API ── */
const ARCHIVE='https://archive-api.open-meteo.com/v1/archive';
const FORECAST='https://api.open-meteo.com/v1/forecast';
const GEO='https://geocoding-api.open-meteo.com/v1/search';
const DAILY_VARS='weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,windspeed_10m_max,relative_humidity_2m_mean';
const HOURLY_VARS='temperature_2m,relative_humidity_2m,precipitation,cloud_cover';

async function geocode(city,country){
  const r=await fetch(`${GEO}?name=${encodeURIComponent(city+' '+country)}&count=1&language=ko`);
  const d=await r.json();
  if(d.results?.length)return[d.results[0].latitude,d.results[0].longitude];
  throw new Error(`"${city}" 위치를 찾을 수 없습니다`);
}

/* daily + hourly 동시 요청 */
async function fetchWeather(lat,lon,start,end){
  const today=todayStr();
  const archiveEnd=offsetDate(today,-6);
  const p=`latitude=${lat}&longitude=${lon}&timezone=auto`;
  let daily=[],hourlyMap={};

  if(start<=archiveEnd){
    const s=start,e=end<=archiveEnd?end:archiveEnd;
    const url=new URL(ARCHIVE);
    url.searchParams.set('latitude',lat);url.searchParams.set('longitude',lon);
    url.searchParams.set('daily',DAILY_VARS);url.searchParams.set('hourly',HOURLY_VARS);
    url.searchParams.set('timezone','auto');url.searchParams.set('start_date',s);url.searchParams.set('end_date',e);
    const r=await fetch(url.toString());const d=await r.json();
    if(d.error)throw new Error(d.reason||'Archive 오류');
    if(d.daily)daily=[...daily,...parseDaily(d.daily)];
    if(d.hourly)mergeHourly(hourlyMap,d.hourly);
  }
  if(end>archiveEnd){
    const s=start>archiveEnd?start:offsetDate(archiveEnd,1),e=end;
    const url=new URL(FORECAST);
    url.searchParams.set('latitude',lat);url.searchParams.set('longitude',lon);
    url.searchParams.set('daily',DAILY_VARS);url.searchParams.set('hourly',HOURLY_VARS);
    url.searchParams.set('timezone','auto');url.searchParams.set('start_date',s);url.searchParams.set('end_date',e);
    const r=await fetch(url.toString());const d=await r.json();
    if(d.error)throw new Error(d.reason||'Forecast 오류');
    if(d.daily)daily=[...daily,...parseDaily(d.daily)];
    if(d.hourly)mergeHourly(hourlyMap,d.hourly);
  }
  /* hourly로 오전/오후 데이터 보강 */
  daily.forEach(row=>{
    const h=hourlyMap[row.date];
    if(!h)return;
    // 오전: 6~11시, 오후: 12~18시
    const amIdx=[6,7,8,9,10,11], pmIdx=[12,13,14,15,16,17,18];
    const pick=(arr,idx)=>idx.map(i=>arr[i]).filter(v=>v!=null);
    row.amTempMax=Math.round(Math.max(...pick(h.temp,amIdx)));
    row.amHumidity=Math.round(avg(pick(h.hum,amIdx)));
    row.amRain=+(sum(pick(h.precip,amIdx))).toFixed(1);
    row.amCond=slotCond(row.amRain,avg(pick(h.cloud,amIdx)));
    row.pmTempMax=Math.round(Math.max(...pick(h.temp,pmIdx)));
    row.pmHumidity=Math.round(avg(pick(h.hum,pmIdx)));
    row.pmRain=+(sum(pick(h.precip,pmIdx))).toFixed(1);
    row.pmCond=slotCond(row.pmRain,avg(pick(h.cloud,pmIdx)));
  });
  return daily;
}

function mergeHourly(map,h){
  (h.time||[]).forEach((t,i)=>{
    const date=t.slice(0,10),hr=parseInt(t.slice(11,13));
    if(!map[date])map[date]={temp:[],hum:[],precip:[],cloud:[]};
    map[date].temp[hr]=h.temperature_2m?.[i]??null;
    map[date].hum[hr]=h.relative_humidity_2m?.[i]??null;
    map[date].precip[hr]=h.precipitation?.[i]??0;
    map[date].cloud[hr]=h.cloud_cover?.[i]??0;
  });
}

function slotCond(rain,cloud){
  if(rain>=15)return'강한비';if(rain>=5)return'비';if(rain>=1)return'소나기';
  if(cloud>=75)return'흐림';if(cloud>=40)return'구름많음';return'맑음';
}
const slotIcon=(c)=>({
  '강한비':'🌧️','비':'🌧️','소나기':'⛈️','흐림':'☁️','구름많음':'⛅','맑음':'☀️','대체로맑음':'🌤️','구름조금':'⛅','안개':'🌫️','이슬비':'🌦️','눈':'🌨️','강한눈':'🌨️','강한소나기':'⛈️','뇌우':'⛈️'
})[c]||'🌡️';

function parseDaily(d){
  return(d.time||[]).map((date,i)=>({
    date,
    cond:WL[d.weathercode?.[i]??0]||'알 수 없음',
    icon:WI[d.weathercode?.[i]??0]||'🌡️',
    tempMax:Math.round(d.temperature_2m_max?.[i]??0),
    tempMin:Math.round(d.temperature_2m_min?.[i]??0),
    amount:+((d.precipitation_sum?.[i]||0)).toFixed(1),
    prob:Math.round(d.precipitation_probability_max?.[i]||0),
    humidity:Math.round(d.relative_humidity_2m_mean?.[i]||0),
    wind:+((d.windspeed_10m_max?.[i]||0)/3.6).toFixed(1),
    // 기본값 (hourly로 덮어씀)
    amTempMax:null,amHumidity:null,amRain:null,amCond:null,
    pmTempMax:null,pmHumidity:null,pmRain:null,pmCond:null,
  }));
}

/* ── 셀 렌더링 ── */
function rainBg(amt){if(!amt||amt<1)return null;if(amt<5)return'#dbeafe';if(amt<15)return'#93c5fd';return'#3b82f6'}

function makeCellHtml(row,type){
  if(!row)return`<td class="cell-fail">—</td>`;
  const rb=rainBg(row.amount),dark=rb==='#3b82f6';
  const baseBg=type==='official'?'#f0f7ff':type==='ai'?'#f9f7ff':'#fff';
  const bg=rb||baseBg;
  const t=dark?'color:#fff':'';

  // 오전/오후 슬롯
  const amCond=row.amCond||(row.cond);
  const pmCond=row.pmCond||(row.cond);
  const amRainBg=rainBg(row.amRain);
  const pmRainBg=rainBg(row.pmRain);

  const slotStyle=(rb)=>rb?`background:${rb};border-radius:4px`:'';

  const amSlot=`<div class="slot slot-am" style="${slotStyle(amRainBg)}">
    <span class="slot-lbl">오전</span>
    <span class="slot-icon">${slotIcon(amCond)}</span>
    <span class="slot-cond" style="${amRainBg==='#3b82f6'?'color:#fff':''}">${amCond}</span>
    <span class="slot-hum" style="${amRainBg==='#3b82f6'?'color:#a5f3fc':''}">💧${row.amHumidity??row.humidity}%</span>
    ${(row.amRain??0)>0?`<span class="slot-rain" style="${amRainBg==='#3b82f6'?'color:#bfdbfe':''}">🌧 ${row.amRain??0}mm</span>`:''}
  </div>`;

  const pmSlot=`<div class="slot slot-pm" style="${slotStyle(pmRainBg)}">
    <span class="slot-lbl">오후</span>
    <span class="slot-icon">${slotIcon(pmCond)}</span>
    <span class="slot-cond" style="${pmRainBg==='#3b82f6'?'color:#fff':''}">${pmCond}</span>
    <span class="slot-hum" style="${pmRainBg==='#3b82f6'?'color:#a5f3fc':''}">💧${row.pmHumidity??row.humidity}%</span>
    ${(row.pmRain??0)>0?`<span class="slot-rain" style="${pmRainBg==='#3b82f6'?'color:#bfdbfe':''}">🌧 ${row.pmRain??0}mm</span>`:''}
  </div>`;

  const confBadge=type==='ai'?`<br><span class="conf-badge ${row.confidence>=85?'ch':row.confidence>=75?'cm':'cl'}">${row.confidence}% 신뢰</span><span class="reason">${row.reasoning}</span>`:'';

  return`<td class="weather-cell" style="background:${bg}">
    <div class="ampm-wrap">${amSlot}<div class="slot-divider"></div>${pmSlot}</div>
    <div class="temp-row">
      <span class="tmin" style="${dark?'color:#bfdbfe':''}">${row.tempMin}°</span>
      <span class="sep">/</span>
      <span class="tmax" style="${dark?'color:#fecaca':''}">${row.tempMax}°</span>
      <span style="font-size:10px;color:${dark?'#e0e7ff':'#8e8e93'};margin-left:3px">강수 ${row.prob}%</span>
    </div>
    <div style="font-size:10px;color:${dark?'#e0e7ff':'#8e8e93'};margin-top:1px;text-align:center">
      ${row.amount>0?`<span style="color:${dark?'#bfdbfe':'#1a56db'};font-weight:600">🌧 ${row.amount}mm</span> `:''}
      💨${row.wind}m/s
    </div>
    ${confBadge}
  </td>`;
}

/* ── KPI ── */
function updateKPI(rows,city,country,s,e,years){
  const v=rows.filter(Boolean);if(!v.length)return;
  let sH=0,sL=0,rain=0,tot=0,sHum=0,sWind=0;
  v.forEach(r=>{sH+=r.tempMax;sL+=r.tempMin;if(r.amount>0){rain++;tot+=r.amount}sHum+=r.humidity;sWind+=r.wind});
  const n=v.length;
  document.getElementById('kpiTitle').textContent=`📍 ${city}, ${country}  ·  ${s} ~ ${e}  ·  과거 ${years}년 실제 데이터`;
  document.getElementById('kpiGrid').innerHTML=[
    {l:'평균 최고기온',v:`${(sH/n).toFixed(1)}°C`},
    {l:'평균 최저기온',v:`${(sL/n).toFixed(1)}°C`},
    {l:'강수일수',v:`${rain}일`},
    {l:'총 강수량',v:`${tot.toFixed(1)}mm`},
    {l:'평균 습도',v:`${Math.round(sHum/n)}%`},
    {l:'평균 풍속',v:`${(sWind/n).toFixed(1)}m/s`},
  ].map(k=>`<div class="kc"><div class="kc-label">${k.l}</div><div class="kc-val">${k.v}<span class="kbadge">실측</span></div></div>`).join('');
}

/* ── 차트 ── */
function renderCharts(yearList,histMap,offRows,dates){
  document.getElementById('chartPanel').style.display='block';
  const labels=dates.map(d=>`${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`);
  const tempDs=[],rainDs=[],legItems=[],rainLeg=[];

  yearList.forEach((yr,idx)=>{
    const rows=histMap[yr]||[];
    const p=PALETTE[idx%PALETTE.length];
    tempDs.push({label:`${yr}년 오전최고`,data:rows.map(r=>r?.amTempMax??r?.tempMax??null),borderColor:p.max,borderWidth:1.5,pointRadius:0,tension:.3,fill:false,borderDash:[]});
    tempDs.push({label:`${yr}년 오후최고`,data:rows.map(r=>r?.pmTempMax??r?.tempMax??null),borderColor:p.min,borderWidth:1.5,pointRadius:0,tension:.3,fill:false,borderDash:[3,3]});
    rainDs.push({label:`${yr}년`,data:rows.map(r=>r?.amount??0),backgroundColor:p.rain,borderRadius:2,borderSkipped:false});
    legItems.push({label:`${yr}년`,maxColor:p.max,minColor:p.min});
    rainLeg.push({label:`${yr}년`,color:p.rain});
  });
  if(offRows.length){
    tempDs.push({label:'예보 오전최고',data:offRows.map(r=>r?.amTempMax??r?.tempMax??null),borderColor:OFF_COLOR.max,borderWidth:2.5,pointRadius:3,pointBackgroundColor:OFF_COLOR.max,tension:.3,fill:false,borderDash:[]});
    tempDs.push({label:'예보 오후최고',data:offRows.map(r=>r?.pmTempMax??r?.tempMax??null),borderColor:OFF_COLOR.min,borderWidth:2.5,pointRadius:3,pointBackgroundColor:OFF_COLOR.min,tension:.3,fill:false,borderDash:[4,4]});
    rainDs.push({label:'예보',data:offRows.map(r=>r?.amount??0),backgroundColor:OFF_COLOR.rain,borderRadius:2,borderSkipped:false});
    rainLeg.push({label:'예보',color:OFF_COLOR.rain});
  }

  document.getElementById('tempLegend').innerHTML=legItems.map(it=>`<div class="cl-item"><span class="cl-dot" style="background:${it.maxColor}"></span><span class="cl-dot-dash" style="border-color:${it.minColor}"></span><span>${it.label}</span></div>`).join('')+(offRows.length?`<div class="cl-item"><span class="cl-dot" style="background:${OFF_COLOR.max}"></span><span>예보 오전</span></div><div class="cl-item"><span class="cl-dot-dash" style="border-color:${OFF_COLOR.min}"></span><span>예보 오후</span></div>`:'');
  document.getElementById('rainLegend').innerHTML=rainLeg.map(it=>`<div class="cl-item"><span class="cl-dot" style="background:${it.color};height:10px;border-radius:2px"></span><span>${it.label}</span></div>`).join('');

  const chartOpts=(yLabel)=>({responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:14},grid:{color:'#f0f0f5'}},y:{ticks:{font:{size:10},callback:v=>`${v}${yLabel}`},grid:{color:'#f0f0f5'},beginAtZero:yLabel==='mm'}}});
  if(tempChartInst)tempChartInst.destroy();
  tempChartInst=new Chart(document.getElementById('tempChart'),{type:'line',data:{labels,datasets:tempDs},options:chartOpts('°')});
  if(rainChartInst)rainChartInst.destroy();
  rainChartInst=new Chart(document.getElementById('rainChart'),{type:'bar',data:{labels,datasets:rainDs},options:chartOpts('mm')});
}

  const s=document.getElementById('dateStart').value,e=document.getElementById('dateEnd').value;

  document.getElementById('matrixHead').innerHTML='';
  document.getElementById('matrixBody').innerHTML='';
  document.getElementById('chartPanel').style.display='none';

    <th class="ch-a"><span class="sbadge sb-a">🟣 AI 예측</span></th>

  /* 과거 실측 병렬 수집 */
  setStatus(`과거 ${years}년 실측 + hourly 데이터 수집 중...`);

  await Promise.all(yearList.map(async yr=>{

    const mm=String(dt.getMonth()+1).padStart(2,'0'),dd=String(dt.getDate()).padStart(2,'0');

      <td class="cell-ai-wait" id="ai-${i}"><span class="spinner" style="border-top-color:#7c3aed;border-color:#ede9fe"></span></td>

도시: ${city}, ${country}
예측 기간: ${s} ~ ${e}

[{"date":"YYYY-MM-DD","cond":"날씨명","icon":"이모지","tempMin":숫자,"tempMax":숫자,"amTempMax":숫자,"pmTempMax":숫자,"amCond":"날씨명","pmCond":"날씨명","amHumidity":숫자,"pmHumidity":숫자,"amRain":숫자,"pmRain":숫자,"amount":숫자,"prob":숫자,"humidity":숫자,"wind":숫자,"confidence":숫자,"reasoning":"한문장"}]
cond/amCond/pmCond: 맑음/구름조금/구름많음/흐림/비/소나기/눈/안개 중 하나, confidence: 70~95`;

      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'content-type':'application/json',
          'x-api-key':API_KEY,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true',
        },
        body:JSON.stringify({
          model:'claude-haiku-4-5-20251001',
          max_tokens:2000,
          messages:[{role:'user',content:prompt}]
        })
      });
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      const txt=(data.content?.find(b=>b.type==='text')?.text||'[]').replace(/```json|```/g,'').trim();
      const aiRows=JSON.parse(txt);
      aiRows.forEach((r,i)=>{
        const cell=document.getElementById(`ai-${i}`);
        if(!cell)return;
        cell.outerHTML=makeCellHtml({...r,source:'ai'},'ai');
      });
    }catch(err){
      dates.forEach((_,i)=>{
        const cell=document.getElementById(`ai-${i}`);
        if(cell)cell.innerHTML=`<span style="font-size:11px;color:#f87171">오류: ${err.message.slice(0,40)}</span>`;
      });
    }
  }else{
    dates.forEach((_,i)=>{
      const cell=document.getElementById(`ai-${i}`);
      if(cell)cell.innerHTML=`<span style="font-size:11px;color:#c7c7cc">API 키 필요</span>`;
    });
  }

  setStatus(`조회 완료 — ${city} ${s} ~ ${e}`,'ok');
  setProgress(-1);
  btn.disabled=false;btn.textContent='조회';
  setTimeout(()=>setStatus(''),4000);
}

function renderRecent(){
  const el=document.getElementById('recentRow');
  el.innerHTML=recentSearches.length
    ?`<span style="font-size:11px;color:#8e8e93">최근:</span>`+recentSearches.map(r=>`<span class="rtag" onclick="loadRecent('${r}')">${r}</span>`).join(''):'';
}
function loadRecent(key){
  const p=key.trim().split(/\s+/);
  document.getElementById('cityInput').value=p[p.length-1];
  document.getElementById('cityInputGroup').style.display='flex';
  document.getElementById('citySelectGroup').style.display='none';
  applyFilter();
}
</script>
