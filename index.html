<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Vault</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; padding: 3rem 1.5rem; }
    .container { max-width: 640px; margin: 0 auto; }
    header { margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
    .back-btn { display: flex; align-items: center; gap: 6px; padding: 6px 14px; background: #21262d; border: 1px solid #30363d; border-radius: 20px; color: #8b949e; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s; flex-shrink: 0; border: 1px solid #30363d; }
    .back-btn:hover { background: #30363d; color: #e6edf3; }
    .header-text h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: .3rem; }
    .header-text .subtitle { color: #8b949e; font-size: .9rem; }
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: .85rem; color: #8b949e; margin-bottom: 1rem; flex-wrap: wrap; }
    .breadcrumb span.sep { color: #30363d; }
    .breadcrumb a { color: #58a6ff; text-decoration: none; cursor: pointer; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb .current { color: #e6edf3; font-weight: 700; }
    .count { font-size: .8rem; color: #8b949e; margin-bottom: 1rem; }
    #list { display: flex; flex-direction: column; gap: .5rem; }
    .item { display: flex; align-items: center; gap: .75rem; padding: .85rem 1.2rem; background: #161b22; border: 1px solid #30363d; border-radius: 8px; text-decoration: none; font-size: .95rem; transition: background .15s, border-color .15s; cursor: pointer; }
    .item.file { color: #58a6ff; }
    .item.file:hover { background: #1f2937; border-color: #58a6ff; }
    .item.folder { color: #e6edf3; }
    .item.folder:hover { background: #1f2937; border-color: #f0883e; }
    .item-icon { font-size: 1rem; flex-shrink: 0; }
    .loading { color: #8b949e; padding: 1rem 0; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div id="back-wrap"></div>
      <div class="header-text">
        <h1>📦 HTML Vault</h1>
        <p class="subtitle" id="subtitle">pages 폴더의 HTML 파일 자동 목록</p>
      </div>
    </header>
    <div class="breadcrumb" id="breadcrumb"></div>
    <p class="count" id="count"></p>
    <div id="list"><p class="loading">불러오는 중...</p></div>
  </div>

  <script>
    var USER = "DielK1618", REPO = "html-vault", BASE = "pages";

    function getCurrentPath() {
      var hash = location.hash.replace("#", "");
      return hash ? hash : BASE;
    }

    function navigate(path) {
      location.hash = path;
    }

    function renderBreadcrumb(path) {
      var bc = document.getElementById("breadcrumb");
      if (path === BASE) { bc.innerHTML = ""; return; }
      var parts = path.split("/"); // ["pages", "폴더명", ...]
      var html = "<a onclick=\"navigate('" + BASE + "')\">🏠 홈</a>";
      var built = "";
      for (var i = 0; i < parts.length; i++) {
        built += (i === 0 ? "" : "/") + parts[i];
        if (i === 0) continue; // "pages" 는 홈으로 처리
        html += "<span class=\"sep\">›</span>";
        if (i === parts.length - 1) {
          html += "<span class=\"current\">" + parts[i] + "</span>";
        } else {
          var p = built;
          html += "<a onclick=\"navigate('" + p + "')\">" + parts[i] + "</a>";
        }
      }
      bc.innerHTML = html;
    }

    function renderBackButton(path) {
      var wrap = document.getElementById("back-wrap");
      if (path === BASE) { wrap.innerHTML = ""; return; }
      var parentParts = path.split("/");
      parentParts.pop();
      var parentPath = parentParts.join("/");
      wrap.innerHTML = "<button class=\"back-btn\" onclick=\"navigate('" + parentPath + "')\">← 뒤로</button>";
    }

    function loadPath(path) {
      var list = document.getElementById("list");
      var count = document.getElementById("count");
      list.innerHTML = "<p class=\"loading\">불러오는 중...</p>";
      count.textContent = "";

      renderBreadcrumb(path);
      renderBackButton(path);

      var folderName = path === BASE ? "" : path.split("/").pop();
      document.getElementById("subtitle").textContent =
        path === BASE ? "pages 폴더의 HTML 파일 자동 목록" : folderName + " 폴더";

      fetch("https://api.github.com/repos/" + USER + "/" + REPO + "/contents/" + path)
        .then(function(r) { return r.json(); })
        .then(function(items) {
          if (!Array.isArray(items)) {
            list.innerHTML = "<p class=\"loading\">불러오기 실패</p>";
            return;
          }

          var folders = items.filter(function(i) { return i.type === "dir"; });
          var files = items.filter(function(i) { return i.type === "file" && i.name.slice(-5) === ".html"; });

          count.textContent = (folders.length ? "📁 폴더 " + folders.length + "개  " : "") +
                              (files.length ? "📄 파일 " + files.length + "개" : "");
          list.innerHTML = "";

          if (folders.length === 0 && files.length === 0) {
            list.innerHTML = "<p class=\"loading\">항목이 없습니다.</p>";
            return;
          }

          // 폴더 먼저 출력
          folders.forEach(function(f) {
            var el = document.createElement("div");
            el.className = "item folder";
            el.innerHTML = "<span class=\"item-icon\">📁</span><span>" + f.name + "</span>";
            el.onclick = function() { navigate(f.path); };
            list.appendChild(el);
          });

          // HTML 파일 (title 태그 파싱)
          files.forEach(function(f) {
            fetch(f.download_url)
              .then(function(r) { return r.text(); })
              .then(function(t) {
                var m = t.match(/<title>([^<]*)<\/title>/i);
                var title = m ? m[1] : f.name.replace(".html", "");
                var el = document.createElement("a");
                el.className = "item file";
                el.href = "./" + f.path;
                el.innerHTML = "<span class=\"item-icon\">📄</span><span>" + title + "</span>";
                list.appendChild(el);
              });
          });
        })
        .catch(function() {
          list.innerHTML = "<p class=\"loading\">불러오기 실패. 저장소가 Public인지 확인하세요.</p>";
        });
    }

    window.addEventListener("hashchange", function() {
      loadPath(getCurrentPath());
    });

    loadPath(getCurrentPath());
  </script>
</body>
</html>
